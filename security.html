<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity - Security Check</title>
    <style>
        :root { --bg: #000000; --fg: #ffffff; }
        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg) !important; 
            background-image: linear-gradient(rgba(128, 128, 128, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(128, 128, 128, 0.1) 1px, transparent 1px);
            background-size: 60px 60px;
            color: var(--fg) !important; 
            font-family: system-ui, -apple-system, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; 
        }

        .corner { position: absolute; width: clamp(30px, 8vw, 80px); height: clamp(30px, 8vw, 80px); border: 2px solid var(--fg); opacity: 0.15; transition: opacity 0.3s; pointer-events: none; }
        .corner-tl { top: 40px; left: 40px; border-right: none; border-bottom: none; }
        .corner-tr { top: 40px; right: 40px; border-left: none; border-bottom: none; }
        .corner-bl { bottom: 40px; left: 40px; border-right: none; border-top: none; }
        .corner-br { bottom: 40px; right: 40px; border-left: none; border-top: none; }

        .top-left { position: absolute; top: clamp(15px, 4vw, 30px); left: clamp(15px, 4vw, 30px); cursor: pointer; opacity: 0.6; transition: opacity 0.3s; color: inherit; display: flex; align-items: center; justify-content: center; text-decoration: none; z-index: 10; }
        .top-left:hover { opacity: 1; }
        .top-left svg { width: clamp(20px, 6vw, 24px); height: clamp(20px, 6vw, 24px); fill: currentColor; }
        
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 85%; max-width: 400px; animation: fadeIn 0.6s ease-out; text-align: center; z-index: 10; padding: 30px; border: 1px solid rgba(128,128,128,0.2); border-radius: 16px; background: rgba(128,128,128,0.02); backdrop-filter: blur(10px); }
        
        .icon-box { width: clamp(60px, 15vw, 80px); height: clamp(60px, 15vw, 80px); border: 1px dashed var(--fg); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 25px; animation: pulse 2s infinite alternate; }
        .icon-box svg { width: clamp(30px, 8vw, 40px); height: clamp(30px, 8vw, 40px); fill: currentColor; }
        
        h2 { font-weight: bold; margin-top: 0; margin-bottom: 10px; font-size: clamp(20px, 6vw, 26px); letter-spacing: 1px; text-transform: uppercase; }
        p { font-size: clamp(12px, 3.5vw, 14px); opacity: 0.8; margin-top: 0; margin-bottom: 40px; line-height: 1.6; }
        strong { font-weight: bold; opacity: 1; }
        
        .btn-verify { width: 100%; padding: clamp(14px, 4vw, 16px); background: var(--fg); color: var(--bg); border: none; border-radius: 12px; font-size: clamp(14px, 4vw, 16px); font-weight: bold; cursor: pointer; transition: transform 0.2s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-verify:active { transform: scale(0.95); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.2); } 100% { box-shadow: 0 0 0 20px rgba(255, 255, 255, 0); } }

        @media (max-width: 768px) {
            .corner { opacity: 0.05; border-width: 1px; }
            .corner-tl { top: 20px; left: 20px; }
            .corner-tr { top: 20px; right: 20px; }
            .corner-bl { bottom: 20px; left: 20px; }
            .corner-br { bottom: 20px; right: 20px; }
            .container { border: none; background: transparent; backdrop-filter: none; padding: 0; }
        }
        @media (max-width: 320px) { .corner { display: none; } }
    </style>
</head>
<body>

    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <a href="#" onclick="goBack(event)" class="top-left">
        <svg viewBox="0 0 24 24"><path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z"/></svg>
    </a>
    <div class="container">
        <div class="icon-box">
            <svg viewBox="0 0 24 24"><path d="M12,17A2,2 0 0,0 14,15C14,13.89 13.1,13 12,13A2,2 0 0,0 10,15A2,2 0 0,0 12,17M18,8A2,2 0 0,1 20,10V20A2,2 0 0,1 18,22H6A2,2 0 0,1 4,20V10C4,8.89 4.9,8 6,8H7V6A5,5 0 0,1 12,1A5,5 0 0,1 17,6V8H18M12,3A3,3 0 0,0 9,6V8H15V6A3,3 0 0,0 12,3Z"/></svg>
        </div>
        <h2><strong>Owner Verification</strong></h2>
        <p>Infinity protocols require <strong>explicit device owner authentication</strong> to proceed with <strong>identity operations</strong>.</p>
        <button class="btn-verify" onclick="verifyOwner()">Verify Identity</button>
    </div>
    <script src="brain.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const source = urlParams.get('source');

        function goBack(e) {
            e.preventDefault();
            if (source === 'request') window.location.href = 'agreement.html';
            else if (source === 'transfer') window.location.href = 'transfer_agreement.html';
            else if (source === 'accept') window.location.href = 'accept_agreement.html';
            else window.location.href = 'home.html';
        }

        async function verifyOwner() {
            try {
                const publicKey = {
                    challenge: new Uint8Array(32), rp: { name: "Infinity Identity" },
                    user: { id: new Uint8Array(16), name: "Device Owner", displayName: "Device Owner" },
                    pubKeyCredParams: [{ type: "public-key", alg: -7 }],
                    authenticatorSelection: { userVerification: "required" },
                    timeout: 60000, attestation: "none"
                };
                await navigator.credentials.create({ publicKey });
                
                if (source === 'request') {
                    window.location.href = 'request.html';
                } else if (source === 'transfer') {
                    window.location.href = 'transfer.html';
                } else if (source === 'accept') {
                    window.location.href = 'accept.html';
                } else {
                    window.location.href = 'home.html';
                }
            } catch (error) {
                alert('Verification Failed', 'System was unable to verify ownership. Access denied.');
            }
        }
    </script>
</body>
</html>
